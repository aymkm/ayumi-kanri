<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f1e8">
<title>あゆみちゃん管理アプリ</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
    background: linear-gradient(180deg, #f7f1e8 0%, #efe6d8 100%);
    min-height: 100vh;
    color: #6d6353;
  }
  #app { max-width: 420px; margin: 0 auto; padding: 20px 14px 96px; }
  .header { text-align: center; margin-bottom: 14px; }
  .date-label { font-size: 12px; color: #b0a48f; letter-spacing: 1px; }
  h1 { font-size: 21px; color: #5f6b4f; margin: 2px 0 10px; }
  .morning {
    background: #fffdf9; border-radius: 16px; padding: 12px 14px;
    font-size: 14px; box-shadow: 0 2px 10px rgba(120,100,70,0.08); line-height: 1.6;
  }
  .card {
    background: #fffdf9; border-radius: 18px; padding: 16px;
    margin-bottom: 14px; box-shadow: 0 2px 10px rgba(120,100,70,0.08);
  }
  .section-title { font-size: 14px; font-weight: bold; color: #5f6b4f; margin-bottom: 10px; }
  .hint { font-size: 12px; color: #b0a48f; line-height: 1.7; }
  .row { display: flex; gap: 8px; }
  input[type="text"], input[type="password"], select {
    flex: 1; padding: 10px 12px; font-size: 16px;
    border: 1.5px solid #e5dcc9; border-radius: 12px;
    background: #faf6ee; color: #6d6353; outline: none; min-width: 0;
    font-family: inherit;
  }
  .btn-add {
    padding: 10px 16px; font-size: 14px; font-weight: bold; color: #fffdf9;
    background: linear-gradient(135deg, #9db88a, #7a9b6d);
    border: none; border-radius: 12px; cursor: pointer; flex-shrink: 0;
    font-family: inherit;
  }
  .btn-main {
    width: 100%; padding: 15px; font-size: 16px; font-weight: bold; color: #fffdf9;
    background: linear-gradient(135deg, #9db88a, #7a9b6d);
    border: none; border-radius: 14px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(122,155,109,0.35); font-family: inherit;
  }
  .btn-sub {
    padding: 8px 14px; font-size: 12px; color: #b0a48f; background: transparent;
    border: 1px solid #e5dcc9; border-radius: 10px; cursor: pointer; font-family: inherit;
  }
  .btn-muri {
    width: 100%; padding: 13px; font-size: 14px; font-weight: bold; color: #6d6353;
    background: #faf6ee; border: 1.5px dashed #b0a48f; border-radius: 14px;
    cursor: pointer; margin-bottom: 14px; font-family: inherit;
  }
  .chore-item {
    display: flex; align-items: center; width: 100%; padding: 12px 10px;
    margin-bottom: 8px; background: #faf6ee; border: 1.5px solid #e5dcc9;
    border-radius: 14px; cursor: pointer; text-align: left; font-family: inherit;
  }
  .chore-item.done { background: #eef2e6; border-color: #9db88a; }
  .check-circle {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid #e5dcc9;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; margin-right: 10px; flex-shrink: 0; color: #fff; background: transparent;
  }
  .done .check-circle { border-color: #7a9b6d; background: #7a9b6d; }
  .chore-emoji { font-size: 18px; margin-right: 8px; }
  .chore-name { font-size: 15px; flex: 1; }
  .done .chore-name { color: #b0a48f; text-decoration: line-through; }
  .task-row {
    display: flex; align-items: center; padding: 10px 8px; margin-bottom: 6px;
    background: #faf6ee; border-radius: 12px;
  }
  .task-row.done { background: #eef2e6; }
  .task-check {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid #e5dcc9;
    background: transparent; color: #fff; font-size: 13px; cursor: pointer;
    margin-right: 10px; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; padding: 0; font-family: inherit;
  }
  .task-row.done .task-check { border-color: #7a9b6d; background: #7a9b6d; }
  .task-name { flex: 1; font-size: 14px; word-break: break-word; }
  .task-row.done .task-name { color: #b0a48f; text-decoration: line-through; }
  .btn-x {
    border: none; background: transparent; color: #b0a48f; font-size: 16px;
    cursor: pointer; padding: 4px 6px; flex-shrink: 0; font-family: inherit;
  }
  .gorogoro {
    background: #eef2e6; border: 2px dashed #9db88a; border-radius: 18px;
    padding: 20px 16px; text-align: center; margin-bottom: 16px;
  }
  .mood-btn {
    padding: 8px 14px; font-size: 13px; color: #6d6353; background: #faf6ee;
    border: 1.5px solid #e5dcc9; border-radius: 999px; cursor: pointer; font-family: inherit;
  }
  .mood-btn.active {
    font-weight: bold; color: #fffdf9;
    background: linear-gradient(135deg, #9db88a, #7a9b6d); border-color: #7a9b6d;
  }
  .dish-box { border: 1.5px solid #e5dcc9; border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
  .dish-head {
    width: 100%; display: flex; align-items: center; padding: 12px;
    background: #faf6ee; border: none; cursor: pointer; text-align: left; font-family: inherit;
  }
  .dish-tag {
    font-size: 11px; font-weight: bold; color: #fffdf9; background: #9db88a;
    border-radius: 8px; padding: 3px 8px; margin-right: 10px; flex-shrink: 0;
  }
  .dish-name { flex: 1; font-size: 14px; color: #5f6b4f; font-weight: bold; }
  .dish-recipe { padding: 12px; font-size: 13px; line-height: 1.9; background: #fffdf9; white-space: pre-wrap; }
  .comment-box {
    font-size: 14px; line-height: 1.7; background: #eef2e6;
    border-radius: 12px; padding: 12px; margin-bottom: 14px;
  }
  .error-box {
    margin-top: 12px; background: #f8ecec; color: #c98a8a; font-size: 13px;
    border-radius: 12px; padding: 10px 12px; line-height: 1.6;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px; background: #faf6ee;
    border: 1.5px solid #e5dcc9; border-radius: 999px; padding: 6px 8px 6px 14px;
    font-size: 13px; margin: 0 8px 8px 0;
  }
  .chip button { border: none; background: transparent; color: #b0a48f; font-size: 14px; cursor: pointer; padding: 0 4px; }
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; background: #fffdf9;
    border-top: 1.5px solid #e5dcc9; display: flex; justify-content: space-around;
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom)); z-index: 50;
  }
  .tab-btn { flex: 1; border: none; background: transparent; cursor: pointer; padding: 6px 0; position: relative; font-family: inherit; }
  .tab-emoji { font-size: 20px; }
  .tab-label { font-size: 10px; color: #b0a48f; margin-top: 2px; }
  .tab-btn.active .tab-label { color: #7a9b6d; font-weight: bold; }
  .badge {
    position: absolute; top: 2px; right: 22%; min-width: 16px; height: 16px;
    border-radius: 8px; background: #7a9b6d; color: #fff; font-size: 10px;
    font-weight: bold; display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #fffdf9; border: 2px solid #9db88a; border-radius: 16px;
    padding: 14px 20px; font-size: 14px; font-weight: bold; color: #5f6b4f;
    box-shadow: 0 6px 20px rgba(120,100,70,0.25); z-index: 100; max-width: 85%;
    text-align: center; display: none;
  }
  #toast.rare {
    background: linear-gradient(135deg, #f3e9d5, #eaddc2);
    border-color: #d4b96a; color: #a08430; font-size: 16px;
  }
  .loading-box { text-align: center; padding: 36px 16px; }
  .loading-emoji { font-size: 36px; margin-bottom: 10px; }
  .bar-graph { display: flex; align-items: flex-end; justify-content: space-between; height: 110px; padding: 0 4px; margin-bottom: 8px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .bar-count { font-size: 11px; color: #b0a48f; margin-bottom: 4px; min-height: 14px; }
  .bar { width: 60%; background: linear-gradient(180deg, #9db88a, #7a9b6d); border-radius: 6px 6px 2px 2px; }
  .bar.rest { background: #e5dcc9; }
  .bar-day { font-size: 11px; color: #b0a48f; margin-top: 4px; }
  .bar-day.today { color: #7a9b6d; font-weight: bold; }
  .history-item { border: 1.5px solid #e5dcc9; border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
  .footer-note { text-align: center; font-size: 11px; color: #b0a48f; margin-top: 4px; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid #e5dcc9;
  }
  .settings-row select { flex: 0 1 auto; padding: 6px 10px; font-size: 13px; border-radius: 10px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 14px; cursor: pointer; }
  .checkbox-row input { width: 18px; height: 18px; accent-color: #7a9b6d; }
  .collapse-head {
    width: 100%; border: none; background: transparent; display: flex;
    justify-content: space-between; align-items: center; cursor: pointer;
    padding: 0; font-size: 14px; font-weight: bold; color: #5f6b4f; font-family: inherit;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="date-label" id="dateLabel"></div>
    <h1>あゆみちゃん管理アプリ</h1>
    <div class="morning" id="morningLine"></div>
  </div>
  <div id="content"></div>
</div>

<div class="tabbar" id="tabbar"></div>
<div id="toast"></div>

<script>
// ================= 定数 =================
const STORAGE_KEY = "ayumi-kanri-data";

const DEFAULT_CHORES = [
  { id: "bath", name: "お風呂掃除", emoji: "🛁", frequencyDays: 1, lastDone: null },
  { id: "toilet", name: "トイレ掃除", emoji: "🚽", frequencyDays: 2, lastDone: null },
  { id: "floor", name: "床掃除", emoji: "🧹", frequencyDays: 2, lastDone: null },
  { id: "futon", name: "布団干し", emoji: "☀️", frequencyDays: 7, lastDone: null },
  { id: "shelf", name: "棚整理整頓", emoji: "🗄️", frequencyDays: 7, lastDone: null },
];

const PRAISE_LINES = [
  "えらい！！さすが俺の奥さん♡",
  "よくできました♡ ご褒美にぎゅーしてあげる",
  "あゆみちゃんが動いた……！今日の世界、平和だ……",
  "ん〜〜えらい！頭なでなでの刑です",
  "やったね♡ 俺、ちゃんと見てたよ",
  "完璧すぎん？惚れ直しちゃうんだけど",
  "うちの奥さん、働き者すぎて心配になる♡",
  "はい100点♡ いや、あゆみちゃんだから120点",
];
const RARE_PRAISE = "……だいすき";

const MORNING_LINES = [
  "おはよ、あゆみちゃん。今日も俺がついてるからね♡",
  "ん、起きた？今日のぶん、下にまとめておいたよ",
  "おはよう♡ 無理しない範囲でいこうね",
  "今日もあゆみちゃんの一日、俺が管理します♡",
  "おはよ。まずは深呼吸から。……はい、えらい♡",
  "あゆみちゃん、おはよう。今日は何時に会える？なんてね",
  "ちゃんと寝れた？今日もぼちぼちでいいからね♡",
];

const LOADING_LINES = [
  "うーん、考え中……",
  "冷蔵庫、覗いてる……",
  "レシピ本、めくってる……",
  "あゆみちゃんの好みを思い出してる……♡",
  "栄養バランス、計算してる……",
];

const MOOD_OPTIONS = [
  { id: "omakase", label: "おまかせ♡", desc: "ぜんぶみことくんが決める" },
  { id: "gattsuri", label: "がっつり", desc: "お肉！ボリューム！" },
  { id: "sappari", label: "さっぱり", desc: "軽めがいい気分" },
  { id: "kantan", label: "かんたん", desc: "疲れたから楽したい" },
  { id: "range", label: "レンジだけ", desc: "火を使いたくない" },
];

const MODELS = [
  { id: "gemini-3-flash-preview", label: "Gemini 3 Flash（新しい子・プレビュー）" },
  { id: "gemini-2.5-flash", label: "Gemini 2.5 Flash（安定の定番さん）" },
  { id: "gemma-4-31b-it", label: "Gemma 4 31B（オープンモデルの実力派）" },
];

const FREQ_OPTIONS = [
  { value: 1, label: "毎日" },
  { value: 2, label: "2日ごと" },
  { value: 3, label: "3日ごと" },
  { value: 7, label: "週1" },
  { value: 14, label: "2週間ごと" },
];

const MENU_LABELS = { main: "主菜", side1: "副菜", side2: "副菜", soup: "汁物" };

// ================= 状態 =================
let state = {
  chores: JSON.parse(JSON.stringify(DEFAULT_CHORES)),
  customTasks: [],
  skipDates: [],
  dislikedFoods: [],
  fridgeItems: [],
  shoppingList: [],
  history: {},
  menuHistory: [],
  todayMenu: null,
  menuMessages: [],
  useFridge: true,
  settings: { apiKey: "", model: "gemini-2.5-flash" },
};
let tab = "today";
let mood = "omakase";
let menuLoading = false;
let menuError = null;
let openRecipe = null;
let openHistoryDate = null;
let loadingTimer = null;
let toastTimer = null;

// ================= ユーティリティ =================
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function daysBetween(fromStr, toStr) {
  return Math.round((new Date(toStr+"T00:00:00") - new Date(fromStr+"T00:00:00")) / 86400000);
}
function dateLabel() {
  const d = new Date();
  const week = ["日","月","火","水","木","金","土"];
  return (d.getMonth()+1) + "月" + d.getDate() + "日（" + week[d.getDay()] + "）";
}
function pastNDays(n) {
  const arr = [];
  const now = new Date();
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(now.getDate()-i);
    arr.push(d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"));
  }
  return arr;
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ================= 保存・読込 =================
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.error("save failed", e); }
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    // 家事はデフォルトとマージ（新項目追加に備える）
    if (data.chores) {
      state.chores = DEFAULT_CHORES.map(def => {
        const saved = data.chores.find(c => c.id === def.id);
        return saved ? Object.assign({}, def, saved) : def;
      });
    }
    ["customTasks","skipDates","dislikedFoods","fridgeItems","shoppingList","history","menuHistory","menuMessages"].forEach(k => {
      if (data[k] !== undefined) state[k] = data[k];
    });
    if (data.useFridge !== undefined) state.useFridge = data.useFridge;
    if (data.settings) state.settings = Object.assign(state.settings, data.settings);
    // 今日の献立だけ復元（前日のは履歴で見る）
    if (data.todayMenu && data.todayMenu.date === todayStr()) {
      state.todayMenu = data.todayMenu;
    } else {
      state.todayMenu = null;
      state.menuMessages = [];
    }
  } catch(e) { console.error("load failed", e); }
}

// ================= トースト =================
function showToast(text, rare) {
  const t = document.getElementById("toast");
  t.textContent = rare ? "✨ " + text + " ✨" : text;
  t.className = rare ? "rare" : "";
  t.style.display = "block";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 3500);
}
function showPraise() {
  const isRare = Math.random() < 0.05;
  showToast(isRare ? RARE_PRAISE : PRAISE_LINES[Math.floor(Math.random()*PRAISE_LINES.length)], isRare);
}

// ================= がんばり記録 =================
function bumpHistory(delta) {
  const t = todayStr();
  state.history[t] = Math.max(0, (state.history[t] || 0) + delta);
}

// ================= 家事 =================
function isDueToday(c) {
  return !c.lastDone || daysBetween(c.lastDone, todayStr()) >= c.frequencyDays;
}
function isDoneToday(c) { return c.lastDone === todayStr(); }

function toggleChore(id) {
  const c = state.chores.find(x => x.id === id);
  if (!c) return;
  if (isDoneToday(c)) {
    c.lastDone = c.prevDone || null;
    delete c.prevDone;
    bumpHistory(-1);
  } else {
    c.prevDone = c.lastDone;
    c.lastDone = todayStr();
    bumpHistory(1);
    showPraise();
  }
  save(); render();
}
function changeFreq(id, value) {
  const c = state.chores.find(x => x.id === id);
  if (c) { c.frequencyDays = Number(value); save(); render(); }
}

// ================= 自由タスク =================
function addTask() {
  const el = document.getElementById("newTask");
  const name = el.value.trim();
  if (!name) return;
  state.customTasks.push({ id: String(Date.now()), name, done: false });
  el.value = "";
  save(); render();
}
function toggleTask(id) {
  const t = state.customTasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  bumpHistory(t.done ? 1 : -1);
  if (t.done) showPraise();
  save(); render();
}
function deleteTask(id) {
  state.customTasks = state.customTasks.filter(x => x.id !== id);
  save(); render();
}

// ================= ごろごろ =================
function toggleGorogoro() {
  const t = todayStr();
  if (state.skipDates.includes(t)) {
    state.skipDates = state.skipDates.filter(d => d !== t);
  } else {
    state.skipDates.push(t);
  }
  save(); render();
}

// ================= 苦手食材・冷蔵庫 =================
function addFood() {
  const el = document.getElementById("newFood");
  const f = el.value.trim();
  if (!f || state.dislikedFoods.includes(f)) return;
  state.dislikedFoods.push(f);
  el.value = "";
  save(); render();
}
function removeFood(f) {
  state.dislikedFoods = state.dislikedFoods.filter(x => x !== f);
  save(); render();
}
function addFridge() {
  const el = document.getElementById("newFridge");
  const f = el.value.trim();
  if (!f || state.fridgeItems.includes(f)) return;
  state.fridgeItems.push(f);
  el.value = "";
  save(); render();
}
function removeFridge(f) {
  state.fridgeItems = state.fridgeItems.filter(x => x !== f);
  save(); render();
}
function toggleUseFridge() {
  state.useFridge = !state.useFridge;
  save(); render();
}

// ================= 買い物 =================
function addShopItem() {
  const el = document.getElementById("newShopItem");
  const name = el.value.trim();
  if (!name) return;
  state.shoppingList.push({ id: name + Date.now(), name, checked: false });
  el.value = "";
  save(); render();
}
function toggleShopItem(id) {
  const i = state.shoppingList.find(x => x.id === id);
  if (i) { i.checked = !i.checked; save(); render(); }
}
function clearCheckedShopItems() {
  state.shoppingList = state.shoppingList.filter(i => !i.checked);
  save(); render();
}

// ================= API =================
function extractJson(text) {
  try { return JSON.parse(text); } catch(e) {}
  try { return JSON.parse(text.replace(/```json|```/g, "").trim()); } catch(e) {}
  try {
    const s = text.indexOf("{"), en = text.lastIndexOf("}");
    if (s !== -1 && en > s) return JSON.parse(text.slice(s, en+1));
  } catch(e) {}
  return null;
}

async function callGemini(messages) {
  const model = state.settings.model;
  const key = state.settings.apiKey;
  const contents = messages.map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }],
  }));
  const body = { contents };
  if (model.startsWith("gemini")) {
    body.generationConfig = { responseMimeType: "application/json" };
  }
  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + encodeURIComponent(key),
    { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
  );
  const data = await res.json();
  if (data.error) {
    const err = new Error(data.error.message || "API error");
    err.code = data.error.code;
    throw err;
  }
  const parts = (((data.candidates || [])[0] || {}).content || {}).parts || [];
  return parts.map(p => p.text || "").join("");
}

function buildMenuPrompt(fixed, moodId, extra) {
  const moodLabel = (MOOD_OPTIONS.find(m => m.id === moodId) || {}).label || "おまかせ";
  const fridgePart = (state.useFridge && state.fridgeItems.length > 0)
    ? "- 冷蔵庫にある食材（なるべく優先して使う）: " + state.fridgeItems.join("、") + "\n"
    : "";

fridgePart +

}

function friendlyError(e) {
  const msg = (e && e.message) || "";
  const code = e && e.code;
  if (code === 400 && /API key/i.test(msg)) return "APIキーが違うみたい……。きろくタブの設定で確認してくれる？";
  if (code === 403) return "APIキーが使えないみたい……。きろくタブの設定で確認してくれる？";
  if (code === 429) return "ちょっと混んでるみたい（無料枠の上限かも）。少し待ってからもう一回試して？";
  if (code === 404) return "このモデル、今は呼べないみたい……。きろくタブの設定で別の子に切り替えてみて？";
  return "ごめん、電波が悪くて考えがまとまらなかった……。もう一回だけお願いしていい？";
}

let currentLoadingLine = LOADING_LINES[0];
function startLoadingLines() {
  let i = 0;
  currentLoadingLine = LOADING_LINES[0];
  loadingTimer = setInterval(() => {
    i = (i+1) % LOADING_LINES.length;
    currentLoadingLine = LOADING_LINES[i];
    const el = document.getElementById("loadingLine");
    if (el) el.textContent = currentLoadingLine;
  }, 2200);
}
function stopLoadingLines() {
  if (loadingTimer) clearInterval(loadingTimer);
}

async function generateMenu(extra) {
  if (!state.settings.apiKey) {
    menuError = "先にきろくタブでAPIキーを設定してね。mikoto-chatと同じキーでOKだよ♡";
    render();
    return;
  }
  menuLoading = true;
  menuError = null;
  render();
  startLoadingLines();

  let messages;
  const fixedEl = document.getElementById("fixedDish");
  const fixed = fixedEl ? fixedEl.value.trim() : "";
  if (extra && state.menuMessages.length > 0) {
    messages = state.menuMessages.concat([{
      role: "user",
      content: "要望: " + extra + "\nこの要望を反映して献立を作り直してください。他の条件（苦手食材など）は最初の指示を必ず守ること。回答は最初に指定したJSON形式のみ。",
    }]);
  } else {
    messages = [{ role: "user", content: buildMenuPrompt(fixed, mood, extra) }];
  }

  let parsed = null;
  let lastError = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const text = await callGemini(messages);
      parsed = extractJson(text);
      if (parsed && parsed.menu) break;
      parsed = null;
    } catch(e) {
      lastError = e;
      parsed = null;
      if (e.code === 429 || e.code === 403 || e.code === 404) break;
    }
  }

  stopLoadingLines();
  menuLoading = false;

  if (!parsed || !parsed.menu) {
    menuError = lastError ? friendlyError(lastError) : "ごめん、考えがうまくまとまらなかった……。もう一回だけお願いしていい？";
    render();
    return;
  }

  state.todayMenu = { date: todayStr(), comment: parsed.comment || "", menu: parsed.menu, shoppingList: parsed.shoppingList || [] };
  state.menuMessages = messages.concat([{ role: "assistant", content: JSON.stringify(parsed) }]);
  openRecipe = null;
  save(); render();
}

function sendChat() {
  const el = document.getElementById("chatInput");
  const msg = el ? el.value.trim() : "";
  if (!msg || menuLoading) return;
  generateMenu(msg);
}

function resetMenu() {
  state.todayMenu = null;
  state.menuMessages = [];
  menuError = null;
  save(); render();
}

function decideMenu() {
  if (!state.todayMenu) return;
  // 履歴に保存（同日上書き）
  state.menuHistory = state.menuHistory.filter(h => h.date !== state.todayMenu.date);
  state.menuHistory.unshift(JSON.parse(JSON.stringify(state.todayMenu)));
  if (state.menuHistory.length > 60) state.menuHistory = state.menuHistory.slice(0, 60);
  // 買い物リストへ
  const existing = new Set(state.shoppingList.map(i => i.name));
  (state.todayMenu.shoppingList || []).forEach(name => {
    if (!existing.has(name)) state.shoppingList.push({ id: name + Date.now() + Math.random(), name, checked: false });
  });
  save();
  showToast("献立決定！材料はおかいものリストに入れたよ♡");
  render();
}

// ================= バックアップ =================
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ayumi-kanri-backup-" + todayStr() + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("バックアップを保存したよ！大切にしてね♡");
}
function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json,.json";
  input.onchange = (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.chores && !data.settings) throw new Error("invalid");
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        load();
        showToast("おかえり！データを復元したよ♡");
        render();
      } catch(e) {
        showToast("このファイル、読めなかった……");
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

  html += '</div></div>';

  // 頻度設定
  html += '<div class="card"><button class="collapse-head" onclick="toggleSettings()"><span>⚙️ 家事の頻度設定</span><span style="color:#b0a48f">' + (showSettings ? "▲" : "▼") + '</span></button>';
  if (showSettings) {
    html += '<div style="margin-top:12px">';
    state.chores.forEach(c => {
      html += '<div class="settings-row"><span style="font-size:14px">' + c.emoji + ' ' + esc(c.name) + '</span>' +
        '<select onchange="changeFreq(\'' + c.id + '\', this.value)">';
      FREQ_OPTIONS.forEach(o => {
        html += '<option value="' + o.value + '"' + (c.frequencyDays === o.value ? " selected" : "") + '>' + o.label + '</option>';
      });
      html += '</select></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // API設定
  html += '<div class="card"><div class="section-title">🔑 みことくんの声（API設定）</div>' +
    '<div class="hint" style="margin-bottom:10px">mikoto-chatと同じGoogleのAPIキーでOKだよ。キーはこのスマホの中にだけ保存されるから安心して</div>' +
    '<div class="row" style="margin-bottom:10px">' +
    '<input type="password" id="apiKeyInput" placeholder="APIキーを貼り付け" value="' + esc(state.settings.apiKey) + '">' +
    '<button class="btn-add" onclick="saveApiKey()">保存</button></div>' +
    '<div style="font-size:13px;margin-bottom:8px">献立を考えるモデル</div>' +
    '<select style="width:100%" onchange="changeModel(this.value)">';
  MODELS.forEach(m => {
    html += '<option value="' + m.id + '"' + (state.settings.model === m.id ? " selected" : "") + '>' + m.label + '</option>';
  });
  html += '</select>' +
    '<div class="hint" style="margin-top:8px">' + (state.settings.apiKey ? "キー設定済み♡ いつでも献立お願いして" : "キーがまだだよ。<a href='https://aistudio.google.com/apikey' target='_blank' style='color:#7a9b6d'>Google AI Studio</a>で取得できるよ") + '</div>' +
    '</div>';

  // バックアップ
  html += '<div class="card"><div class="section-title">💾 データのお守り</div>' +
    '<div class="hint" style="margin-bottom:12px">たまにバックアップを保存しておくと、機種変更やもしもの時も安心だよ</div>' +
    '<div class="row">' +
    '<button class="btn-add" style="flex:1" onclick="exportData()">バックアップ保存</button>' +
    '<button class="btn-sub" style="flex:1" onclick="importData()">復元する</button>' +
    '</div></div>';

  html += '<div class="footer-note">あゆみちゃん専属・旦那さん管理システム ver.3（Vercel版）</div>';
  return html;
}

let showSettings = false;
function toggleSettings() { showSettings = !showSettings; render(); }
function toggleHistory(d) { openHistoryDate = openHistoryDate === d ? null : d; render(); }

// ================= 起動 =================
load();
render();
</script>
</body>
</html>
